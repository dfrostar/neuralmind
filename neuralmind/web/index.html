<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NeuralMind — Graph View</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header>
        <h1>NeuralMind</h1>
        <span id="project-name"></span>
      </header>

      <section class="panel">
        <input id="search" type="search" placeholder="Quick switch (⌘K or /) — semantic search…" autocomplete="off" />
        <ul id="search-results"></ul>
      </section>

      <section class="panel">
        <label class="toggle">
          <input type="checkbox" id="toggle-synapses" checked />
          Learned synapses (Hebbian)
        </label>
        <label class="toggle">
          <input type="checkbox" id="toggle-structural" checked />
          Structural edges (calls / imports)
        </label>
        <label class="toggle">
          <input type="checkbox" id="toggle-local" />
          Local graph (focus selection)
        </label>
        <label class="slider-row" for="local-depth">
          <span class="slider-label">Depth</span>
          <input type="range" id="local-depth" min="1" max="3" step="1" value="1" />
          <span id="local-depth-value" class="slider-value">1</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="toggle-solo" />
          Solo selected community
        </label>
        <label class="toggle">
          <input type="checkbox" id="toggle-filter-search" />
          Limit graph to search hits
        </label>
        <label class="toggle">
          <input type="checkbox" id="toggle-labels" />
          Always show labels
        </label>
        <label class="slider-toggle">
          <span>Min synapse weight: <span id="weight-readout">0.05</span></span>
          <input type="range" id="synapse-min-weight" min="0" max="1" step="0.05" value="0.05" aria-label="Minimum synapse weight to display" />
        </label>
        <div class="button-row">
          <button id="reset-layout" type="button" class="ghost">Reset saved layout</button>
          <button id="unpin-all" type="button" class="ghost">Unpin all</button>
          <button id="export-png" type="button" class="ghost">Export PNG</button>
        </div>
      </section>

      <section class="panel" id="detail-panel">
        <h2>Node</h2>
        <p class="muted">Click a node to inspect its links.</p>
      </section>

      <section class="panel" id="replay-panel">
        <h2>
          Recent queries
          <button id="replay-refresh" type="button" class="ghost-mini" title="Refresh recent queries" aria-label="Refresh recent queries">↻</button>
        </h2>
        <p id="replay-empty" class="muted">No queries yet — run <code>neuralmind query</code>.</p>
        <ul id="replay-list"></ul>
      </section>

      <section class="panel">
        <h2>Communities</h2>
        <ul id="community-list"></ul>
      </section>

      <section class="panel" id="activity-panel">
        <h2>
          Activity
          <span
            id="activity-status"
            class="activity-status"
            role="status"
            aria-live="polite"
            aria-label="Live stream status: connecting"
            title="Live stream status: connecting"
          >·</span>
        </h2>
        <ul id="event-log" aria-live="polite"></ul>
      </section>

      <footer id="stats"></footer>
    </aside>

    <main id="canvas-wrap">
      <canvas
        id="graph"
        role="img"
        tabindex="0"
        aria-label="Force-directed graph of code nodes. Use the search box, community list, and node detail panel on the left for keyboard-accessible navigation."
      ></canvas>
      <div id="tooltip" hidden></div>
      <div id="loading">Building index &amp; loading graph…</div>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
