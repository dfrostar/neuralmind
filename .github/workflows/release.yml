name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  validate-version:
    name: Validate Tag vs Package Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check tag matches pyproject.toml version
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION="$(python - <<'EOF'
          import re, sys
          content = open("pyproject.toml").read()
          m = re.search(r'^\s*version\s*=\s*"([^"]+)"', content, re.MULTILINE)
          if not m:
              print("ERROR: version not found in pyproject.toml", file=sys.stderr)
              sys.exit(1)
          print(m.group(1))
          EOF
          )"
          echo "Tag version:     ${TAG_VERSION}"
          echo "Package version: ${PKG_VERSION}"
          if [ "${TAG_VERSION}" != "${PKG_VERSION}" ]; then
            echo "ERROR: Git tag v${TAG_VERSION} does not match pyproject.toml version ${PKG_VERSION}."
            echo "Please delete the wrong tag and push the correct tag matching pyproject.toml."
            exit 1
          fi
          echo "OK: tag v${TAG_VERSION} matches pyproject.toml version ${PKG_VERSION}."

  test:
    name: Run Tests
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  build:
    name: Build Package
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Store build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/neuralmind
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password needed - uses trusted publishing via OIDC

  smoke-test-pypi:
    name: Smoke Test PyPI Package
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Smoke test published package from PyPI
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Testing neuralmind==${VERSION}"
          sleep 30
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          for attempt in 1 2 3 4 5; do
            if pip install "neuralmind==${VERSION}"; then
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "Failed to install neuralmind==${VERSION} from PyPI after retries."
              exit 1
            fi
            sleep $((attempt * 15))
          done
          INSTALLED_VERSION="$(python -c "import neuralmind; print(neuralmind.__version__)")"
          if [ "${INSTALLED_VERSION}" != "${VERSION}" ]; then
            echo "Error: Version mismatch. Expected ${VERSION}, got ${INSTALLED_VERSION}."
            exit 1
          fi
          neuralmind --help

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/neuralmind
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
        continue-on-error: true  # Don't fail if version already exists

  github-release:
    name: Create GitHub Release
    needs: [build, publish-pypi, smoke-test-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Attach dist artifacts to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*
