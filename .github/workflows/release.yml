name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  build:
    name: Build Package
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Store build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/neuralmind
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password needed - uses trusted publishing via OIDC

  smoke-test-pypi:
    name: Smoke Test PyPI Package
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Smoke test published package from PyPI
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Testing neuralmind==${VERSION}"
          sleep 30
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          for attempt in 1 2 3 4 5; do
            if pip install "neuralmind==${VERSION}"; then
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "Failed to install neuralmind==${VERSION} from PyPI after retries."
              exit 1
            fi
            sleep $((attempt * 15))
          done
          INSTALLED_VERSION="$(python -c "import neuralmind; print(neuralmind.__version__)")"
          if [ "${INSTALLED_VERSION}" != "${VERSION}" ]; then
            echo "Error: Version mismatch. Expected ${VERSION}, got ${INSTALLED_VERSION}."
            exit 1
          fi
          neuralmind --help

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/neuralmind
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
        continue-on-error: true  # Don't fail if version already exists

  github-release:
    name: Create GitHub Release
    needs: [build, publish-pypi, smoke-test-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: NeuralMind v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## NeuralMind v${{ steps.get_version.outputs.VERSION }}

            ### Installation

            ```bash
            pip install neuralmind==${{ steps.get_version.outputs.VERSION }}
            ```

            ### What's Changed

            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### Links

            - [PyPI](https://pypi.org/project/neuralmind/${{ steps.get_version.outputs.VERSION }}/)
            - [Documentation](https://github.com/dfrostar/neuralmind#readme)
          files: |
            dist/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
