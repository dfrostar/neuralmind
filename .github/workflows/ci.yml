name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Check formatting with Black
        run: black --check --diff .

      - name: Lint with Ruff
        run: ruff check .

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12']
        include:
          # Cross-OS coverage on a representative Python so every platform is
          # actually exercised without a full 3x3 runner-minute blow-up.
          - os: macos-latest
            python-version: '3.12'
          # windows-latest is intentionally omitted from the gating matrix:
          # the suite has real Windows issues (chromadb holds open file
          # handles so tempdir teardown hits WinError 32, event-log rotation
          # relies on POSIX rename-over-open, and a concurrent-append test
          # loses writes). Tracked separately before Windows can be claimed
          # as supported — see the Windows-support tracking issue.

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Upload coverage (Python 3.11 only)
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v7
        with:
          fail_ci_if_error: false
        continue-on-error: true

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install mypy

      - name: Run mypy
        run: mypy neuralmind --ignore-missing-imports --disable-error-code=no-untyped-def --implicit-optional
        continue-on-error: true

  fresh-install:
    name: Fresh Install (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12']
        include:
          # macOS shares the bash + venv bin/ layout the smoke steps assume, so
          # they run as-is. Windows fresh-install needs Scripts/ venv path
          # handling — tracked as a follow-up.
          - os: macos-latest
            python-version: '3.12'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install into fresh venv (no dev extras, no editable)
        run: |
          python -m venv .smoke
          source .smoke/bin/activate
          pip install --upgrade pip
          pip install .

      - name: pip check
        run: |
          source .smoke/bin/activate
          pip check

      - name: Import smoke test
        run: |
          source .smoke/bin/activate
          python -c "
          import neuralmind
          import neuralmind.cli
          import neuralmind.core
          import neuralmind.embedder
          import neuralmind.config
          import neuralmind.compressors
          import neuralmind.hooks
          "

      - name: MCP bundling smoke test
        run: |
          source .smoke/bin/activate
          # The whole point of v0.5.0 is that `pip install neuralmind`
          # (no extras) gives a working MCP server out of the box.
          # Catch packaging regressions before they ship to PyPI.
          python -c "import mcp; import mcp.server; import mcp.types"
          python -c "from neuralmind.mcp_server import MCP_AVAILABLE; assert MCP_AVAILABLE, 'MCP SDK not importable from base install'"
          command -v neuralmind-mcp >/dev/null || { echo 'neuralmind-mcp not on PATH'; exit 1; }

      - name: CLI smoke test
        run: |
          source .smoke/bin/activate
          neuralmind --help

  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Check package
        run: |
          # twine's metadata validation is backed by `packaging`. The runner's
          # preinstalled packaging lags behind the Metadata-Version that
          # hatchling now emits (2.5), so `twine check` fails with
          # "Invalid distribution metadata: '2.5' is not a valid metadata
          # version". packaging >= 26.0 is the first release that recognises
          # Metadata-Version 2.5; pin the floor rather than upgrading to
          # latest so the job stays reproducible.
          pip install twine "packaging>=26"
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
