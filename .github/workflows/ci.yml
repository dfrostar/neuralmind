name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Check formatting with Black
        run: black --check --diff .

      - name: Lint with Ruff
        run: ruff check .

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12']
        include:
          # Cross-OS coverage on a representative Python so every platform is
          # actually exercised without a full 3x3 runner-minute blow-up.
          - os: macos-latest
            python-version: '3.12'
          - os: windows-latest
            python-version: '3.12'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # ChromaDB is an opt-in extra as of v0.29.0; install it here so the
          # suite exercises BOTH the default turbovec backend (base dep) and the
          # opt-in chroma backend. The Fresh Install job proves the default
          # install is ChromaDB-free.
          pip install -e ".[dev,chromadb]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Upload coverage (Python 3.11 only)
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v7
        with:
          fail_ci_if_error: false
        continue-on-error: true

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install mypy

      - name: Run mypy
        run: mypy neuralmind --ignore-missing-imports --disable-error-code=no-untyped-def --implicit-optional
        continue-on-error: true

  fresh-install:
    name: Fresh Install (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12']
        include:
          # macOS shares the bash + venv bin/ layout the smoke steps assume, so
          # they run as-is. Windows fresh-install needs Scripts/ venv path
          # handling — tracked as a follow-up.
          - os: macos-latest
            python-version: '3.12'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install into fresh venv (no dev extras, no editable)
        run: |
          python -m venv .smoke
          source .smoke/bin/activate
          pip install --upgrade pip
          pip install .

      - name: pip check
        run: |
          source .smoke/bin/activate
          pip check

      - name: Import smoke test
        run: |
          source .smoke/bin/activate
          # NOTE: do NOT import neuralmind.embedder here — it is the ChromaDB
          # backend (top-level `import chromadb`), which is an opt-in extra as of
          # v0.29.0. The default install must work without it.
          python -c "
          import neuralmind
          import neuralmind.cli
          import neuralmind.core
          import neuralmind.config
          import neuralmind.compressors
          import neuralmind.hooks
          import neuralmind.backend_manager
          "

      - name: ChromaDB-free default install assertions (v0.29.0)
        run: |
          source .smoke/bin/activate
          # The default install must be ChromaDB-free and resolve to turbovec.
          python -c "
          import importlib.util as u
          assert u.find_spec('chromadb') is None, 'default install must not pull ChromaDB'
          assert u.find_spec('turbovec') is not None, 'turbovec must be a base dependency'
          from neuralmind.backend_manager import resolve_backend, turbovec_available
          assert turbovec_available(), 'turbovec stack must be importable on a base install'
          assert resolve_backend('auto') == 'turbovec', 'auto must resolve to turbovec by default'
          "
          # Selecting the chroma backend without the extra must raise an
          # actionable error, not an opaque ModuleNotFoundError.
          python -c "
          from neuralmind.backend_manager import create_backend
          try:
              create_backend('graph', '.')
          except ModuleNotFoundError as e:
              assert 'neuralmind[chromadb]' in str(e), e
          else:
              raise SystemExit('expected a ModuleNotFoundError with an install hint')
          "

      - name: MCP bundling smoke test
        run: |
          source .smoke/bin/activate
          # The whole point of v0.5.0 is that `pip install neuralmind`
          # (no extras) gives a working MCP server out of the box.
          # Catch packaging regressions before they ship to PyPI.
          python -c "import mcp; import mcp.server; import mcp.types"
          python -c "from neuralmind.mcp_server import MCP_AVAILABLE; assert MCP_AVAILABLE, 'MCP SDK not importable from base install'"
          command -v neuralmind-mcp >/dev/null || { echo 'neuralmind-mcp not on PATH'; exit 1; }

      - name: CLI smoke test
        run: |
          source .smoke/bin/activate
          neuralmind --help

  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Check package
        run: |
          # twine's metadata validation is backed by `packaging`. The runner's
          # preinstalled packaging lags behind the Metadata-Version that
          # hatchling now emits (2.5), so `twine check` fails with
          # "Invalid distribution metadata: '2.5' is not a valid metadata
          # version". packaging >= 26.0 is the first release that recognises
          # Metadata-Version 2.5; pin the floor rather than upgrading to
          # latest so the job stays reproducible.
          pip install twine "packaging>=26"
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
