name: Self-benchmark

# Runs the hermetic self-benchmark on every PR and every push to main.
# Produces a PR comment with reduction + learning uplift, and fails the
# build if the aggregate reduction drops below the conservative floor.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + benchmark deps
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]" tiktoken matplotlib graphifyy

      - name: Pre-fetch tiktoken vocab
        # tiktoken lazily downloads vocab files from Azure Blob Storage on
        # first use. Doing it here makes any network failure fail loudly
        # and early instead of mid-benchmark with a confusing traceback.
        # The benchmark code also has a graceful fallback, so this step
        # is "nice to have" — the benchmark still runs (with a char-based
        # approximation) if the download fails.
        continue-on-error: true
        run: |
          python -c "
          import tiktoken
          for name in ('o200k_base', 'cl100k_base'):
              try:
                  enc = tiktoken.get_encoding(name)
                  enc.encode('probe')
                  print(f'[tiktoken] {name} OK')
              except Exception as e:
                  print(f'[tiktoken] {name} FAILED: {type(e).__name__}: {e}')
          "

      - name: Build fixture knowledge graph
        run: |
          graphify update tests/fixtures/sample_project
          neuralmind build tests/fixtures/sample_project --force

      - name: Faithfulness eval (A/B) gate
        # Reuses the index built above to run the real with-NeuralMind vs
        # matched-budget naive A/B and gate on the measured fact-recall delta.
        # The benchmark answers "how many tokens?"; this answers "are the right
        # facts still in the context?" — the honesty half of the story.
        run: |
          python -m evals.faithfulness.runner --run --json | tee eval_faithfulness.json
          python - <<'PY'
          import json
          d = json.load(open("eval_faithfulness.json"))
          nm, naive = d["nm_mean_recall"], d["naive_mean_recall"]
          delta = d["faithfulness_delta"]
          print(
              f"[eval] fact-recall  NeuralMind {nm:.3f}  vs  "
              f"naive(matched-budget) {naive:.3f}  ->  delta {delta:+.3f}  "
              f"over {d['n_queries']} queries"
          )
          # Gate: NeuralMind's *selected* context must not carry fewer gold
          # facts than dumb truncation of the whole repo to the same token
          # budget. A negative delta means retrieval regressed below a naive
          # baseline — that's the failure we want CI to catch. Floor at 0 is
          # deliberately conservative on this tiny fixture; tighten once we
          # have a stable measured distribution.
          assert delta >= 0.0, (
              f"faithfulness regression: NeuralMind recall {nm:.3f} < "
              f"naive {naive:.3f} (delta {delta:+.3f})"
          )
          PY

      - name: Run benchmark (Phase 1 + Phase 2)
        id: bench
        run: |
          python -m tests.benchmark.run
          python -m tests.benchmark.multi_model

      - name: Run memory-persistence + regression tests
        run: python -m pytest tests/test_benchmark_regression.py tests/test_memory_persistence.py -v

      - name: Generate chart
        run: python scripts/generate_chart.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: |
            tests/benchmark/results.json
            tests/benchmark/report.md
            tests/benchmark/multi_model.json
            tests/benchmark/multi_model.md
            docs/images/benchmark_chart.png
          if-no-files-found: error

      - name: Build PR comment body
        if: github.event_name == 'pull_request'
        id: comment
        run: |
          # Two-step pattern: generate the body in a file, then hand it to
          # the comment action via GITHUB_OUTPUT. Actions inputs don't
          # process $(...) shell substitutions, so we must materialize
          # the body here.
          {
            echo 'body<<EOF'
            cat tests/benchmark/report.md
            echo ''
            cat tests/benchmark/multi_model.md
            echo ''
            echo '---'
            echo '_Automated by `.github/workflows/ci-benchmark.yml` — regenerate locally with `python -m tests.benchmark.run`._'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: neuralmind-self-benchmark
          message: ${{ steps.comment.outputs.body }}
